<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>focus — irregular interactive glow</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      display:grid;
      place-items:center;
      background:#000;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"space mono",Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    .wrap{position:relative;display:inline-block;text-align:center;}

    h1{
      margin:0;
      color:#fff;
      font-family: roboto;
      font-size:clamp(48px,12vw,160px);
      letter-spacing:0.02em;
      position:relative;
      z-index:2;
      user-select:none;
    }

    /* irregular glow shape using multiple gradients */
    .glow{
      position:absolute;
      left:50%;top:50%;
      width:calc(min(80vw,900px));
      height:calc(min(40vw,300px));
      border-radius: 40% 20% 65% 75% / 55% 20% 60% 15% / 20% 10% 80% 50%; /* irregular shape */
      background:
        radial-gradient(circle at 30% 40%, rgba(35,150,255,0.8), rgba(10,30,60,0) 70%),
        radial-gradient(circle at 10% 60%, rgba(80,200,255,0.6), rgba(10,30,30,0) 80%),
        radial-gradient(circle at 50% 50%, rgba(30,100,255,0.5), rgba(10,30,60,0) 100%);
      filter:blur(45px) saturate(180%);
      mix-blend-mode:screen;
      transition:transform 0.1s ease-out;
      z-index:1;
      pointer-events:none;
    }

    .vignette{
      position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(1000px 600px at 50% 45%,rgba(0,0,0,0) 60%,rgba(0,0,0,0.4) 100%);
      mix-blend-mode:multiply;
      z-index:3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glow" id="glowEl"></div>
    <h1>focus</h1>
  </div>
  <div class="vignette"></div>
  <script>
    const glow=document.getElementById('glowEl');
    let windowW=window.innerWidth,windowH=window.innerHeight;
    window.addEventListener('resize',()=>{windowW=window.innerWidth;windowH=window.innerHeight;});

    // interactive motion with stronger response from sides
    window.addEventListener('mousemove',e=>{
      const percentX=e.clientX/windowW - 0.5;
      const percentY=e.clientY/windowH - 0.5;
      const moveX=percentX*200; // stronger horizontal movement
      const moveY=percentY*100;
      glow.style.transform=`translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px)) rotate(${percentX*10}deg)`;
    });
  </script>
</body>
</html>

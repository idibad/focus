<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>focus — interactive glow</title>
<style>
  html,body{height:100%;margin:0;cursor:none;}
  body{
    display:grid;
    place-items:center;
    background:#000;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"space mono",Arial;
    overflow:hidden;
  }

  .wrap{position:relative;display:inline-block;text-align:center;}

  h1{
    margin:0;
    color:#fff;
    font-family:roboto;
    font-size:clamp(48px,12vw,160px);
    letter-spacing:0.02em;
    position:relative;
    z-index:2;
    user-select:none;
  }

  /* irregular glow background */
  .glow{
    position:absolute;
    left:50%;top:50%;
    width:calc(min(80vw,900px));
    height:calc(min(40vw,300px));
    border-radius: 40% 20% 65% 75% / 55% 20% 60% 15%;
    background:
      radial-gradient(circle at 30% 40%, rgba(35,150,255,0.8), rgba(10,30,60,0) 70%),
      radial-gradient(circle at 10% 60%, rgba(80,200,255,0.6), rgba(10,30,30,0) 80%),
      radial-gradient(circle at 50% 50%, rgba(30,100,255,0.5), rgba(10,30,60,0) 100%);
    filter:blur(45px) saturate(180%);
    mix-blend-mode:screen;
    transition:transform 0.1s ease-out;
    z-index:1;
    pointer-events:none;
  }

  .vignette{
    position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(1000px 600px at 50% 45%,rgba(0,0,0,0) 60%,rgba(0,0,0,0.4) 100%);
    mix-blend-mode:multiply;
    z-index:3;
  }

  /* custom cursor */
  .cursor {
    position: fixed;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    transform: translate(-50%, -50%);
    transition: transform 0.05s linear;
  }

  /* click glow effect */
  .click-glow {
    position: fixed;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0) 70%);
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    animation: pulse 0.8s ease-out forwards;
    mix-blend-mode: screen;
    z-index: 5;
  }

  @keyframes pulse {
    to {
      transform: translate(-50%, -50%) scale(2);
      opacity: 0;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="glow" id="glowEl"></div>
    <h1>focus</h1>
  </div>
  <div class="vignette"></div>
  <div class="cursor" id="cursor"></div>

  <script>
    const glow = document.getElementById('glowEl');
    const cursor = document.getElementById('cursor');
    let windowW = window.innerWidth, windowH = window.innerHeight;

    window.addEventListener('resize', () => {
      windowW = window.innerWidth;
      windowH = window.innerHeight;
    });

    // move glow and cursor with mouse
    window.addEventListener('mousemove', e => {
      const percentX = e.clientX / windowW - 0.5;
      const percentY = e.clientY / windowH - 0.5;
      const moveX = percentX * 200;
      const moveY = percentY * 100;
      glow.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px)) rotate(${percentX * 10}deg)`;
      cursor.style.left = `${e.clientX}px`;
      cursor.style.top = `${e.clientY}px`;
    });

    // click to produce temporary glow
    window.addEventListener('click', e => {
      const g = document.createElement('div');
      g.className = 'click-glow';
      g.style.left = `${e.clientX}px`;
      g.style.top = `${e.clientY}px`;
      document.body.appendChild(g);
      g.addEventListener('animationend', () => g.remove());
    });
  </script>
</body>
</html>
